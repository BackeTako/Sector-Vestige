- type: entity
  parent: BaseAmmoProvider # this is for cycling swabs out and not spawning 30 entities, trust
  id: BoxEmergencyPen
  name: emergency medipen dispenser
  description: Dispenses 6 emergency medipens.
  components:
      - type: Sprite
        sprite: _SV/Objects/Storage/boxes.rsi
        layers:
        - state: boxwide
        - state: epi_pen
      - type: BallisticAmmoProvider
        whitelist:
            components:
                - Injector
        proto: EmergencyMedipen
        capacity: 6
      - type: GuideHelp
        guides:
        - MedicalDoctor
