- type: markingsGroup
  parent: Undergarments
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ FelinidEarsBasic ]
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FelinidTailBasic ]
    enum.HumanoidVisualLayers.LArm:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  name: felinid appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganHumanTorso
      Head: OrganHumanHead
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganAnimalStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid
  - type: Inventory
    speciesId: Felinid
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Urist McFelinid
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Damageable
    damageModifierSet: Felinid
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Speech
    speechSounds: Alto
    speechVerb: Felinid
    allowedEmotes:
    - Hiss
    - Meow
    - Mew
    - Growl
    - Purr
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 1
  - type: Stamina
  - type: TypingIndicator
    proto: felinid
  - type: Vocal
    sounds:
      Male: SoundsFelinidMale
      Female: SoundsFelinidFemale
      Unsexed: SoundsFelinidMale
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:Emote
        emote: Scream
        probability: 0.2
