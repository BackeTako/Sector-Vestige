  components:
  - type: HumanoidAppearance
    species: Reptilian
    hideLayersOnEquip:
    - Snout
    - HeadTop
    - HeadSide
    undergarmentBottom: UndergarmentBottomBoxersReptilian
  - type: Inventory
    speciesId: reptilian
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit-female
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
    displacements:
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask

